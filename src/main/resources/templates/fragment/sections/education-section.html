<section id="education" th:fragment="education">
    <h2>MI EDUCACIÓN</h2>

    <div class="education-timeline" th:each="education : ${educations}">
        <div class="timeline-item">
            <h3 th:text="${education.degree + ' - ' + education.institution}"></h3>
            <p class="timeline-date"
               th:text="${education.startDate + ' - ' + education.endDate}">
            </p>
            <p th:text="${education.description}"></p>
        </div>
    </div>

</section>
