<!DOCTYPE html>
<html lang="es" th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lista de proyectos</title>
    <link rel="stylesheet" href="/css/general.css">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/list.css">
    <link rel="stylesheet" href="/css/style-form-project.css">
</head>
<body>

    <header th:fragment="header">
        <div class="container">
            <div th:insert="~{fragment/nav-admin :: nav}" ></div>
        </div>
    </header>

    <main>
        <div class="container">
            <section class="admin-section">
                <h2>Proyectos guardados</h2>

                <a th:href="@{projects/new-project}">Crear nuevo proyecto</a>

                <table class="admin-table">
                    <thead>
                    <tr>
                        <th>Titulo</th>
                        <th>Descripcion</th>
                        <th>Url del proyecto</th>
                        <th>Imagen</th>

                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="project : ${projectDTOList}">
                        <td th:text="${project.title}"></td>
                        <td th:text="${project.description}"></td>
                        <td th:text="${project.projectUrl}"></td>
                        <td>
                            <img th:src="@{${project.imageUrl}}" width="150" height="150"  alt="Imagen del proyecto">
                        </td>
                    </tr>
                    </tbody>
                </table>
            </section>
        </div>
    </main>


    <div th:insert="~{fragment/footer :: footer}"></div>
</body>
</html>
