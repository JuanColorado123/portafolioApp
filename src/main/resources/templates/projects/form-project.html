<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Formulario</title>
</head>
<body>
    <h1>Formulario de Informacion Personal</h1>

    <form th:action="@{/personal-info-save}" th:object="${personalInfo}" method="post">
        <div>
            <label >Nombre: </label>
            <input type="text" name="" id="" th:field="*{firstName}">
        </div>
        <div>
            <label >Email: </label>
            <input type="text" name="" id="a" th:fiel="*{email}">
        </div>

        <button type="submit">Guardar</button>
    </form>
</body>
</html>
